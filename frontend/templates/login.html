{% extends "base.html" %}
{% block title %}Log In — CTAP{% endblock %}
{% block content %}
<div class="auth-container">
  <form id="login-form" class="technical-panel" method="post" action="#">
    <h2>Log In</h2>
    <p id="login-error" class="error-text" style="display:none;"></p>
    <input type="text" name="username" placeholder="Username" required autocomplete="username">
    <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
    <button type="submit" style="margin-top:10px;">Sign In</button>
    <div style="text-align:center;font-size:11px;margin-top:10px;font-family:var(--font-mono);">
      No account? <a href="{{ url_for('register_page') }}" style="color:var(--text-primary);text-decoration:underline;">Register</a>
    </div>
  </form>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  const fd = new FormData(e.target);
  const username = fd.get('username');
  const password = fd.get('password');
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      err.textContent = '[' + (data.error || 'Login failed') + ']';
      err.style.display = 'block';
      return;
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('username', data.username);
    location.href = '/chat';
  } catch {
    err.textContent = '[Network error]';
    err.style.display = 'block';
  }
});
</script>
{% endblock %}
