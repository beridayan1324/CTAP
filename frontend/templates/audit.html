{% extends "base.html" %}
{% block title %}Audit — CTAP{% endblock %}
{% block content %}
<script>
if (!localStorage.getItem('token')) location.replace('/login');
</script>
<nav class="nav-bar">
  <div style="display:flex;align-items:center;gap:30px;">
    <div style="font-weight:600;letter-spacing:0.1em;"><a href="/chat" style="color:white;">CTAP Chat</a></div>
    <a href="/chat">Chat Room</a>
    <a href="/audit">Audit Logs</a>
  </div>
  <div class="nav-links">
    <span id="audit-user" style="color:var(--text-secondary);"></span>
    <button type="button" id="audit-logout">Logout</button>
  </div>
</nav>
<div class="audit-page">
  <div class="audit-header">
    <h2>System Audit Trail</h2>
    <div class="audit-tabs">
      <button type="button" id="tab-messages" class="active">Message Hashes</button>
      <button type="button" id="tab-connections">Connection Events</button>
    </div>
  </div>
  <div id="audit-loading" style="font-family:var(--font-mono);font-size:13px;opacity:0.5;">[ Loading logs... ]</div>
  <div id="audit-table-wrap" style="flex:1;overflow:auto;display:none;"></div>
</div>
<script src="{{ url_for('static', filename='audit.js') }}" defer></script>
{% endblock %}
